# fly.toml — Dash productivity app
app = "dash-prod"         # change this to your desired app name (must be globally unique)
primary_region = "cdg"   # Paris — change to nearest: ams, lhr, fra, sin, syd, iad, ord, sjc

[build]

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https    = true

  # "suspend" = ~1-2s resume (not 30s spin-down). This is the key setting.
  auto_stop_machines  = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

# Persistent volume — keeps your SQLite DB across deploys
[[mounts]]
  source      = "dash_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
