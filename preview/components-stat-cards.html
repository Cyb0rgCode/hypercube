<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Stat card</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 14px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.14);
    display: flex; align-items: center; gap: 14px;
  }
  .icon {
    width: 44px; height: 44px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon svg { width: 22px; height: 22px; }
  .green { background: rgba(106,247,200,0.13); color: #6af7c8; }
  .yellow { background: rgba(247,199,106,0.13); color: #f7c76a; }
  .cyan { background: rgba(106,247,200,0.13); color: #6af7c8; }
  .num {
    font-family: var(--font-mono); font-weight: 700;
    font-size: 28px; letter-spacing: -0.03em;
    color: #e8e8f0; font-feature-settings: "tnum"; line-height: 1.05;
  }
  .lbl {
    font-family: var(--font-mono); font-size: 10px;
    color: #6060a0; letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 3px;
  }
</style></head>
<body>
<div class="card-frame">
  <div class="grid">
    <div class="stat">
      <div class="icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <div><div class="num">12</div><div class="lbl">tasks done today</div></div>
    </div>
    <div class="stat">
      <div class="icon yellow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.06 2-6 .5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg></div>
      <div><div class="num">86%</div><div class="lbl">habit rate · 7d</div></div>
    </div>
    <div class="stat">
      <div class="icon cyan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div>
      <div><div class="num">7</div><div class="lbl">open tasks</div></div>
    </div>
  </div>
</div>
</body></html>
