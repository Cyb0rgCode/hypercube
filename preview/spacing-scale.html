<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Spacing scale</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .row-s { display: flex; gap: 18px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .b {
    width: 28px;
    background: linear-gradient(180deg, #7c6af7, #9d8fff);
    border-radius: 4px;
    box-shadow: 0 4px 14px rgba(124,106,247,0.18);
  }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); font-weight: 700; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: #6060a0; letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body>
<div class="card-frame">
  <div class="row-s">
    <div class="col"><div class="b" style="height:4px"></div><div class="v">4</div><div class="lbl">s-1</div></div>
    <div class="col"><div class="b" style="height:8px"></div><div class="v">8</div><div class="lbl">s-2</div></div>
    <div class="col"><div class="b" style="height:12px"></div><div class="v">12</div><div class="lbl">s-3</div></div>
    <div class="col"><div class="b" style="height:16px"></div><div class="v">16</div><div class="lbl">s-4</div></div>
    <div class="col"><div class="b" style="height:20px"></div><div class="v">20</div><div class="lbl">s-5</div></div>
    <div class="col"><div class="b" style="height:24px"></div><div class="v">24</div><div class="lbl">s-6</div></div>
    <div class="col"><div class="b" style="height:32px"></div><div class="v">32</div><div class="lbl">s-7</div></div>
    <div class="col"><div class="b" style="height:40px"></div><div class="v">40</div><div class="lbl">s-8</div></div>
  </div>
</div>
</body></html>
