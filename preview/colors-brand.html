<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Brand palette</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .v1 { background: #7c6af7; }
  .v2 { background: #9d8fff; }
  .vd { background: rgba(124,106,247,0.15); border-color: rgba(124,106,247,0.35); }
  .focus-ring {
    background: var(--bg-3);
    border: 1px solid var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
</style></head>
<body>
<div class="card-frame">
  <div class="grid">
    <div class="swatch v1"><div class="name">Violet</div><div class="hex">#7C6AF7</div></div>
    <div class="swatch v2"><div class="name">Violet · Light</div><div class="hex">#9D8FFF</div></div>
    <div class="swatch vd"><div class="name" style="color:#9d8fff">Violet · Dim 15%</div><div class="hex" style="color:rgba(157,143,255,0.7)">rgba(124,106,247,.15)</div></div>
    <div class="swatch focus-ring"><div class="name" style="color:var(--accent)">Focus ring</div><div class="hex" style="color:var(--fg-2)">accent + dim 3px</div></div>
  </div>
</div>
</body></html>
