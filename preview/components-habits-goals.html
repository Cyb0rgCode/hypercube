<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Habit &amp; goal</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .item {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 14px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.14);
  }
  .check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #1e1e2e; background: none;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #0a0a0f;
  }
  .check.done { background: #6af7c8; border-color: #6af7c8; }
  .title { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: #e8e8f0; flex: 1; }
  .streak {
    font-family: var(--font-mono); font-size: 11px;
    color: #f7c76a; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .streak svg { width: 12px; height: 12px; }
  .goal-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .bar-bg { background: #1a1a26; border-radius: 20px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, #7c6af7, #6af7c8); border-radius: 20px; }
  .goal-meta { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: #6060a0; }
</style></head>
<body>
<div class="card-frame">
  <div class="item">
    <div class="check done">✓</div>
    <div class="title">Read for 30 minutes</div>
    <span class="streak"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.06 2-6 .5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>14 day streak</span>
  </div>
  <div class="item">
    <div class="goal-wrap">
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span class="title">Run 100 km this quarter</span>
        <span class="goal-meta" style="font-size:11px;">62%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:62%"></div></div>
      <div class="goal-meta"><span>62 / 100 km</span><span>by Jun 30</span></div>
    </div>
  </div>
</div>
</body></html>
