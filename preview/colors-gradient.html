<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Brand gradient</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .hero {
    flex: 1;
    padding: 22px 24px;
    border-radius: var(--r-xl);
    background: linear-gradient(135deg, rgba(124,106,247,0.12) 0%, rgba(106,247,200,0.06) 100%);
    border: 1px solid rgba(124,106,247,0.25);
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: "";
    position: absolute;
    width: 240px; height: 240px;
    right: -60px; top: -100px;
    background: radial-gradient(circle, rgba(124,106,247,0.28), transparent 60%);
    filter: blur(40px);
    pointer-events: none;
  }
  .icon-square {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, #7c6af7, #6af7c8);
    box-shadow: 0 8px 24px rgba(124,106,247,0.4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative; z-index: 1;
  }
  .icon-square svg { width: 26px; height: 26px; color: #fff; }
  .grad-text {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #7c6af7 0%, #9d8fff 60%, #6af7c8 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    position: relative; z-index: 1;
  }
  .grad-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: #6060a0;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
    position: relative; z-index: 1;
  }
  .bar { height: 8px; border-radius: 20px; background: linear-gradient(90deg, #7c6af7, #6af7c8); width: 60%; }
  .bar-bg { background: #1a1a26; border-radius: 20px; height: 8px; overflow: hidden; }
</style></head>
<body>
<div class="card-frame">
  <div class="hero">
    <div class="icon-square">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/>
      </svg>
    </div>
    <div>
      <div class="grad-text">Brand gradient</div>
      <div class="grad-meta">135° · #7C6AF7 → #9D8FFF → #6AF7C8</div>
    </div>
  </div>
  <div class="bar-bg"><div class="bar"></div></div>
</div>
</body></html>
