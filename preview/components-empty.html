<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Empty state</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 36px 24px; gap: 10px;
    border: 1px dashed #1e1e2e; border-radius: 14px;
    color: #6060a0;
  }
  .icon {
    width: 44px; height: 44px; border-radius: 14px;
    background: rgba(124,106,247,0.15); color: #7c6af7;
    display: flex; align-items: center; justify-content: center;
  }
  .icon svg { width: 22px; height: 22px; }
  .ttl {
    font-family: var(--font-display); font-weight: 700;
    font-size: 14px; color: #e8e8f0; letter-spacing: -0.01em;
  }
  .hint {
    font-family: var(--font-mono); font-size: 11px;
    color: #6060a0; letter-spacing: 0.03em;
    max-width: 320px; line-height: 1.55;
  }
</style></head>
<body>
<div class="card-frame">
  <div class="empty">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </div>
    <div class="ttl">Inbox zero</div>
    <div class="hint">All caught up — no pending tasks.</div>
  </div>
</div>
</body></html>
