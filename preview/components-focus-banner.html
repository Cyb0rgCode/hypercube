<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Focus banner</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .focus-banner {
    position: relative; overflow: hidden;
    display: flex; align-items: center; gap: 18px;
    padding: 22px 24px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(124,106,247,0.12) 0%, rgba(106,247,200,0.06) 100%);
    border: 1px solid rgba(124,106,247,0.25);
  }
  .glow {
    position: absolute;
    width: 280px; height: 280px;
    right: -80px; top: -120px;
    background: radial-gradient(circle, rgba(124,106,247,0.28), transparent 60%);
    filter: blur(40px);
    pointer-events: none;
  }
  .icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, #7c6af7, #6af7c8);
    box-shadow: 0 8px 24px rgba(124,106,247,0.4);
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .icon svg { width: 24px; height: 24px; }
  .content { flex: 1; position: relative; z-index: 1; }
  .label {
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #9d8fff;
    margin-bottom: 4px;
  }
  .task {
    font-family: var(--font-display); font-size: 18px; font-weight: 700;
    color: #e8e8f0; letter-spacing: -0.01em;
  }
  .meta {
    font-family: var(--font-mono); font-size: 12px; color: #6060a0;
    white-space: nowrap; position: relative; z-index: 1;
  }
  .meta strong { color: #e8e8f0; font-weight: 700; }
</style></head>
<body>
<div class="card-frame">
  <div class="focus-banner">
    <div class="glow"></div>
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>
    </div>
    <div class="content">
      <div class="label">Today's focus</div>
      <div class="task">Finish thesis introduction draft</div>
    </div>
    <div class="meta"><strong>3</strong> more pending</div>
  </div>
</div>
</body></html>
