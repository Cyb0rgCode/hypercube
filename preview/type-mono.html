<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Mono type</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .specimen { font-family: var(--font-mono); color: var(--fg-1); }
  .big   { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6060a0; }
  .meta  { font-size: 11px; color: #6060a0; letter-spacing: 0.04em; }
  .row-spec { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
</style></head>
<body>
<div class="card-frame" style="gap:14px;">
  <div class="specimen big">Today's focus &nbsp; 14:42 &nbsp; 1h 20m</div>
  <div class="row-spec">
    <span class="specimen label">today's focus</span>
    <span class="specimen meta">Tuesday, May 14 · 3 pending</span>
  </div>
  <div class="row-spec" style="margin-top:4px;">
    <span class="specimen" style="font-size:10px; color:#6060a0; letter-spacing:0.06em;">JetBrains Mono · 400 / 600 / 700 · 0.04–0.12em tracking</span>
  </div>
</div>
</body></html>
