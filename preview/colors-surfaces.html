<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Surfaces & ink</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .bg  { background: #0a0a0f; }
  .s1  { background: #12121a; }
  .s2  { background: #1a1a26; }
  .b   { background: #1e1e2e; }
  .text { background: #e8e8f0; }
</style></head>
<body>
<div class="card-frame">
  <div class="grid">
    <div class="swatch bg"><div class="name">bg</div><div class="hex">#0A0A0F</div></div>
    <div class="swatch s1"><div class="name">surface</div><div class="hex">#12121A</div></div>
    <div class="swatch s2"><div class="name">surface-2</div><div class="hex">#1A1A26</div></div>
    <div class="swatch b"><div class="name">border</div><div class="hex">#1E1E2E</div></div>
    <div class="swatch text dark"><div class="name">text</div><div class="hex">#E8E8F0</div></div>
  </div>
  <div class="row" style="gap:18px; padding-top:4px;">
    <div style="font-family:var(--font-ui); font-size:14px; font-weight:600;">Primary ink — #E8E8F0</div>
    <div style="font-family:var(--font-mono); font-size:11px; color:#6060a0; letter-spacing:.04em;">muted · #6060A0 · meta &amp; labels</div>
  </div>
</div>
</body></html>
