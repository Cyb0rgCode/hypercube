<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Heading scale</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .row-spec { display: flex; align-items: baseline; gap: 16px; }
  .heading { font-family: var(--font-display); font-weight: 800; color: var(--fg-1); letter-spacing: -0.02em; line-height: 1.1; }
  .h0 { font-size: 36px; letter-spacing: -0.03em; }
  .h1 { font-size: 26px; }
  .h2 { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .h3 { font-size: 14px; font-weight: 600; }
  .spec {
    font-family: var(--font-mono); font-size: 10px; color: #6060a0;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
</style></head>
<body>
<div class="card-frame" style="gap:14px;">
  <div class="row-spec"><div class="heading h0">Page title</div><div class="spec">Syne 800 · 36 · −.03em</div></div>
  <div class="row-spec"><div class="heading h1">Section heading</div><div class="spec">Syne 800 · 26 · −.02em</div></div>
  <div class="row-spec"><div class="heading h2">Subsection</div><div class="spec">Syne 700 · 14 · −.01em</div></div>
  <div class="row-spec"><div class="heading h3">Task title row</div><div class="spec">Syne 600 · 14</div></div>
</div>
</body></html>
