<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Sidebar nav</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .card-frame { padding: 0; flex-direction: row; }
  .sidebar {
    width: 232px;
    background: rgba(18,18,26,0.75);
    backdrop-filter: blur(20px);
    border-right: 1px solid #1a1a28;
    padding: 22px 14px;
    display: flex; flex-direction: column;
    align-self: stretch;
  }
  .logo { display: flex; align-items: center; gap: 11px; margin-bottom: 28px; padding: 0 6px; font-family: var(--font-display); font-size: 16px; font-weight: 800; color: #e8e8f0; letter-spacing: -0.02em; }
  .mark { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, #7c6af7, #6af7c8); box-shadow: 0 6px 18px rgba(124,106,247,0.4), inset 0 0 0 1px rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
  .mark svg { width: 16px; height: 16px; }
  nav { display: flex; flex-direction: column; gap: 2px; }
  .nb {
    border-left: 2px solid transparent;
    color: #6060a0;
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    display: flex; align-items: center; gap: 12px;
    background: none;
  }
  .nb.active {
    color: #7c6af7;
    border-left-color: #7c6af7;
    font-weight: 800;
    background: rgba(124,106,247,0.15);
    border-radius: 10px;
    border-left: none;
    box-shadow: 0 4px 14px rgba(124,106,247,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .nb svg { width: 18px; height: 18px; }
  .ann { padding: 24px; flex: 1; }
  .ttl { font-family: var(--font-display); font-weight: 800; font-size: 16px; color: #e8e8f0; margin-bottom: 8px; }
  .note { font-family: var(--font-mono); font-size: 11px; color: #6060a0; line-height: 1.6; letter-spacing: 0.02em; }
</style></head>
<body>
<div class="card-frame">
  <aside class="sidebar">
    <div class="logo"><span class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="9" rx="1.5"/><rect x="13.5" y="3" width="7.5" height="5" rx="1.5"/><rect x="13.5" y="11" width="7.5" height="10" rx="1.5"/><rect x="3" y="15" width="7.5" height="6" rx="1.5"/></svg></span><span>Husky</span></div>
    <nav>
      <button class="nb active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="3" y1="20" x2="21" y2="20"/></svg>Dashboard</button>
      <button class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.2"/><rect x="14" y="3" width="7" height="7" rx="1.2"/><rect x="3" y="14" width="7" height="7" rx="1.2"/><rect x="14" y="14" width="7" height="7" rx="1.2"/></svg>Matrix</button>
      <button class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tasks</button>
      <button class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor"/></svg>Habits &amp; Goals</button>
    </nav>
  </aside>
  <div class="ann">
    <div class="ttl">Sidebar nav</div>
    <div class="note">232px fixed · glass blur 20px · springy sliding pill indicator on active state · iOS-style scale(0.94) tap feedback</div>
  </div>
</div>
</body></html>
