<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Tags &amp; badges</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .chip { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.04em; border-radius: 4px; padding: 1px 6px; border: 1px solid transparent; white-space: nowrap; }
  .pill { font-family: var(--font-mono); font-size: 9px; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.08em; border: 1px solid transparent; }

  .tag-type     { color: #9d8fff; background: rgba(124,106,247,0.15); border-color: rgba(124,106,247,0.2); }
  .tag-category { color: #6af7c8; background: rgba(106,247,200,0.13); border-color: rgba(106,247,200,0.25); }
  .tag-urgent   { color: #f76a8c; background: rgba(247,106,140,0.13); border-color: rgba(247,106,140,0.3); font-weight: 700; }
  .tag-key      { color: #6af7c8; background: rgba(106,247,200,0.13); border-color: rgba(106,247,200,0.3); font-weight: 700; }

  .b-high { background: rgba(247,106,140,0.13); color: #f76a8c; border-color: rgba(247,106,140,0.25); }
  .b-medium { background: rgba(247,199,106,0.13); color: #f7c76a; border-color: rgba(247,199,106,0.25); }
  .b-low { background: rgba(106,247,200,0.13); color: #6af7c8; border-color: rgba(106,247,200,0.25); }

  .time-badge {
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    color: #7c6af7; background: rgba(124,106,247,0.15);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 20px; padding: 2px 8px;
  }
  .forecast-badge {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    color: #6af7c8; background: rgba(106,247,200,0.1);
    border: 1px solid rgba(106,247,200,0.25);
    border-radius: 20px; padding: 2px 9px;
    letter-spacing: 0.04em;
  }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: #6060a0; letter-spacing: 0.08em; text-transform: uppercase; margin-top:6px; }
</style></head>
<body>
<div class="card-frame">
  <div class="row" style="gap: 8px;">
    <span class="chip tag-type">assignment</span>
    <span class="chip tag-category">Math 201</span>
    <span class="chip tag-urgent">! urgent</span>
    <span class="chip tag-key">★ key</span>
    <span class="pill b-high">high</span>
    <span class="pill b-medium">medium</span>
    <span class="pill b-low">low</span>
    <span class="time-badge">⏱ 1h 20m</span>
    <span class="forecast-badge">7d forecast</span>
  </div>
  <div class="lbl">tag · 10px mono · ★ ! ⏱ glyphs are part of the brand</div>
</div>
</body></html>
