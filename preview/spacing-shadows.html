<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Shadows</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .row-s { display: flex; gap: 22px; }
  .e {
    flex: 1;
    height: 90px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #6060a0;
    letter-spacing: 0.06em;
  }
  .e1 { box-shadow: 0 1px 2px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.14); }
  .e2 { box-shadow: 0 2px 6px rgba(0,0,0,0.22), 0 12px 32px rgba(0,0,0,0.32); }
  .e3 { box-shadow: 0 4px 14px rgba(124,106,247,0.3); border-color: rgba(124,106,247,0.4); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: #6060a0; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 8px; text-align: center; }
  .col { display: flex; flex-direction: column; flex: 1; }
</style></head>
<body>
<div class="card-frame">
  <div class="row-s">
    <div class="col"><div class="e e1">sm</div><div class="lbl">shadow-sm · cards</div></div>
    <div class="col"><div class="e e2">md</div><div class="lbl">shadow-md · modal · hover</div></div>
    <div class="col"><div class="e e3">accent</div><div class="lbl">shadow-accent · primary btn</div></div>
  </div>
</div>
</body></html>
