<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Radii</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .row-r { display: flex; gap: 16px; align-items: flex-end; }
  .r { background: var(--bg-2); border: 1px solid var(--line); width: 80px; height: 64px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .r .v { font-family: var(--font-mono); font-size: 10px; color: #6060a0; letter-spacing: 0.06em; }
  .r4 { border-radius: 4px; } .r6 { border-radius: 6px; } .r8 { border-radius: 8px; }
  .r12 { border-radius: 12px; } .r14 { border-radius: 14px; } .rp { border-radius: 999px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: #6060a0; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; text-align: center; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style></head>
<body>
<div class="card-frame">
  <div class="row-r">
    <div class="col"><div class="r r4"><span class="v">4</span></div><div class="lbl">xs · tag</div></div>
    <div class="col"><div class="r r6"><span class="v">6</span></div><div class="lbl">sm · chip</div></div>
    <div class="col"><div class="r r8"><span class="v">8</span></div><div class="lbl">md · button</div></div>
    <div class="col"><div class="r r12"><span class="v">12</span></div><div class="lbl">lg · segment</div></div>
    <div class="col"><div class="r r14"><span class="v">14</span></div><div class="lbl">xl · card</div></div>
    <div class="col"><div class="r rp"><span class="v">999</span></div><div class="lbl">pill</div></div>
  </div>
</div>
</body></html>
