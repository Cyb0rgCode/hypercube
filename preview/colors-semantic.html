<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Semantic colors</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pink  { background: #f76a8c; }
  .amber { background: #f7c76a; }
  .mint  { background: #6af7c8; }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid transparent;
  }
  .b-high   { background: rgba(247,106,140,0.13); color: #f76a8c; border-color: rgba(247,106,140,0.25); }
  .b-medium { background: rgba(247,199,106,0.13); color: #f7c76a; border-color: rgba(247,199,106,0.25); }
  .b-low    { background: rgba(106,247,200,0.13); color: #6af7c8; border-color: rgba(106,247,200,0.25); }
</style></head>
<body>
<div class="card-frame">
  <div class="grid">
    <div class="swatch pink dark">
      <div class="name">Pink · danger</div>
      <div class="hex">#F76A8C · high · urgent</div>
    </div>
    <div class="swatch amber dark">
      <div class="name">Amber · warning</div>
      <div class="hex">#F7C76A · medium · streak</div>
    </div>
    <div class="swatch mint dark">
      <div class="name">Mint · success</div>
      <div class="hex">#6AF7C8 · low · done</div>
    </div>
  </div>
  <div class="chips">
    <span class="pill b-high">high</span>
    <span class="pill b-medium">medium</span>
    <span class="pill b-low">low</span>
    <span class="pill b-low">★ key</span>
    <span class="pill b-high">! urgent</span>
  </div>
</div>
</body></html>
