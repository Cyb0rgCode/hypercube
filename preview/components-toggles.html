<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Toggles &amp; segmented</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  .seg {
    position: relative;
    display: inline-flex;
    gap: 0;
    padding: 4px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 1px 2px rgba(0,0,0,0.12);
  }
  .seg .thumb {
    position: absolute; top: 4px; left: 4px;
    height: calc(100% - 8px); width: 86px;
    background: linear-gradient(180deg, #1a1a26, #12121a);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 9px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04);
    transform: translateX(86px);
  }
  .seg button {
    background: none; border: none;
    color: #6060a0;
    padding: 6px 18px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 1;
    min-width: 78px;
  }
  .seg button.active { color: var(--fg-1); }

  .toggle {
    background: #1a1a26;
    border: 1px solid #1e1e2e;
    color: #6060a0;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
  }
  .toggle.urgent-on { background: #f76a8c; border-color: #f76a8c; color: #0a0a0f; }
  .toggle.important-on { background: #6af7c8; border-color: #6af7c8; color: #0a0a0f; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: #6060a0; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }
</style></head>
<body>
<div class="card-frame">
  <div class="col" style="gap:6px;">
    <div class="seg">
      <span class="thumb"></span>
      <button>All</button><button class="active">Pending</button><button>Done</button>
    </div>
    <div class="lbl">segmented · springy thumb slide</div>
  </div>
  <div class="row" style="gap:10px; margin-top:4px;">
    <button class="toggle">Urgent</button>
    <button class="toggle urgent-on">Urgent</button>
    <button class="toggle">Important</button>
    <button class="toggle important-on">Important</button>
  </div>
</div>
</body></html>
