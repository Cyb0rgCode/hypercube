<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<title>Husky — Buttons</title>
<link rel="stylesheet" href="preview.css"/>
<style>
  button { font-family: var(--font-display); border: none; cursor: pointer; }
  .btn-primary {
    background: #7c6af7;
    color: #fff;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(124,106,247,0.3);
  }
  .btn-ghost {
    background: #1a1a26;
    color: #6060a0;
    border: 1px solid #1e1e2e;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .btn-dashed {
    background: #1a1a26;
    border: 1px dashed #1e1e2e;
    color: #6060a0;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 600;
    letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .btn-dashed svg { width: 14px; height: 14px; }
  .btn-danger {
    background: rgba(247,106,140,0.13);
    color: #f76a8c;
    border: 1px solid rgba(247,106,140,0.35);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: var(--font-mono);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .btn-icon {
    background: none; border: none;
    color: #6060a0;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 6px;
    cursor: pointer; line-height: 1;
  }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: #6060a0; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }
</style></head>
<body>
<div class="card-frame">
  <div class="row" style="align-items: flex-end; gap: 14px;">
    <div class="col" style="gap:0">
      <button class="btn-primary">Add</button>
      <div class="lbl">primary · syne 700</div>
    </div>
    <div class="col" style="gap:0">
      <button class="btn-ghost">Mark done</button>
      <div class="lbl">ghost · mono</div>
    </div>
    <div class="col" style="gap:0">
      <button class="btn-dashed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import JSON
      </button>
      <div class="lbl">dashed · mono</div>
    </div>
    <div class="col" style="gap:0">
      <button class="btn-danger">Delete</button>
      <div class="lbl">danger</div>
    </div>
    <div class="col" style="gap:0; align-items:center;">
      <div style="display:flex; gap:4px;">
        <button class="btn-icon" title="Edit">✎</button>
        <button class="btn-icon" title="Delete">✕</button>
      </div>
      <div class="lbl">btn-icon · row actions</div>
    </div>
  </div>
</div>
</body></html>
